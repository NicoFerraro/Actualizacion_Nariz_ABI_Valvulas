; PlatformIO Project Configuration File
;
;   Build options: build flags, source filter
;   Upload options: custom upload port, speed and extra flags
;   Library options: dependencies, extra library storages
;   Advanced options: extra scripting
;
; Please visit documentation for the other options and examples
; https://docs.platformio.org/page/projectconf.html

[platformio]
default_envs = valvulas

[env]
platform = espressif32
board = nodemcu-32s
framework = arduino
lib_ldf_mode = deep+
board_build.partitions = partitions/custom_ota.csv
lib_deps =
    https://github.com/alanswx/ESPAsyncWiFiManager.git
    https://github.com/me-no-dev/ESPAsyncWebServer.git
    https://github.com/me-no-dev/AsyncTCP.git
    https://github.com/Networking-for-Arduino/EthernetENC.git
    knolleary/PubSubClient @ ^2.8
    bblanchon/ArduinoJson @ ^6.21.5
	adafruit/RTClib @ ^2.1.3

[env:valvulas]
extends = env
build_src_filter =
  +<*>
  -<sd_diag_main.cpp>
build_flags =
  -I include
  -D APP_VARIANT=APP_VARIANT_VALVULAS
  -D APP_VERSION=\"0.2.4\"

[env:entrada_unica]
extends = env
build_src_filter =
  +<*>
  -<sd_diag_main.cpp>
build_flags =
  -I include
  -D APP_VARIANT=APP_VARIANT_ENTRADA_UNICA
  -D APP_VERSION=\"1.0.0\"

[env:sd_diag]
extends = env
build_flags =
  -I include
  -D APP_VARIANT=APP_VARIANT_VALVULAS
  -D APP_VERSION=\"sd-diag\"
build_src_filter =
  -<*>
  +<sd_diag_main.cpp>
